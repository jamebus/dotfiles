[custom.git_wip]
description = "git wip state"
when = true
require_repo = true
command = '''git log -1 --pretty=format:%B | grep -E '[^[:alnum:]](wip|WIP)[^[:alnum:]]' >/dev/null && echo wip'''
style = "bold red"

[custom.cloud_instance]
description = "cloud instance id. for ec2, but works on others too"
when = '''test -L /var/lib/cloud/instance'''
command = '''realpath /var/lib/cloud/instance | sed 's,^.*/,,''''
symbol = "ŅīĮ "
style = "bold dimmed green"
format = "[$symbol($output)]($style) in "

[custom.docker_buildx_builder]
description = "Docker buildx builder"
detect_files = [
  "compose.yml",
  "compose.yaml",
  "docker-compose.yml",
  "docker-compose.yaml",
  "Dockerfile"
]
command = '''jq -r '(.Name | select(. != null and . != "")) // .Key' ~/.docker/buildx/current'''
symbol = "Ņ╗┐ "
style = "blue bold"
format = "via [$symbol($output)]($style) "

